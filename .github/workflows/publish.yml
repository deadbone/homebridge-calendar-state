name: Publish to npm

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  publish-current-stable:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package script
        run: npm run verify:pack --if-present

      - name: Verify package contents
        run: npm --cache .npm-cache pack --dry-run

      - name: Publish stable
        run: npm publish

      - name: Create and push release tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release create "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${VERSION}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}

  publish-pr-beta:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package script
        run: npm run verify:pack --if-present

      - name: Verify package contents
        run: npm --cache .npm-cache pack --dry-run

      - name: Set beta version
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const pkg = require('./package.json');
          const [core] = pkg.version.split('-');
          const [major, minor, patch] = core.split('.').map(Number);
          if ([major, minor, patch].some((part) => !Number.isInteger(part))) {
            throw new Error(`Unsupported package version: ${pkg.version}`);
          }
          const nextPatch = pkg.version.includes('-') ? `${major}.${minor}.${patch}` : `${major}.${minor}.${patch + 1}`;
          const betaVersion = `${nextPatch}-beta.pr.${process.env.PR_NUMBER}.${process.env.GITHUB_RUN_NUMBER}.${process.env.GITHUB_RUN_ATTEMPT}`;
          execFileSync('npm', ['version', betaVersion, '--no-git-tag-version'], { stdio: 'inherit' });
          NODE
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Publish beta
        run: npm publish --tag beta

  publish-stable-release:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package script
        run: npm run verify:pack --if-present

      - name: Verify package contents
        run: npm --cache .npm-cache pack --dry-run

      - name: Version patch
        run: |
          npm version patch -m "chore: release v%s [skip ci]"

      - name: Push release commit and tag
        run: git push --follow-tags origin HEAD:main

      - name: Publish stable
        run: npm publish

      - name: Create GitHub Release
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          gh release create "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${VERSION}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
